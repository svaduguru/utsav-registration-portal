<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Utsav</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="site-header">
        <a href="/" class="brand">College <span>Utsav</span></a>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/login.html">Login</a>
        </nav>
      </header>

      <div class="card-panel" data-page="register">
        <h2>Create your account</h2>
        <div id="msg" class="msg hidden" role="alert"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="full_name">Full name</label>
            <input id="full_name" name="full_name" type="text" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              minlength="4"
              autocomplete="new-password"
            />
          </div>
          <div class="form-group">
            <label for="college">College name</label>
            <input id="college" name="college" type="text" required autocomplete="organization" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Register</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--muted)">
          Already have an account? <a href="/login.html">Log in</a>
        </p>
      </div>

      <footer class="site-footer">College Utsav Registration Portal</footer>
    </div>
    <script src="/script.js"></script>
  </body>
</html>
