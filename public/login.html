<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Utsav</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="site-header">
        <a href="/" class="brand">College <span>Utsav</span></a>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/register.html">Register</a>
        </nav>
      </header>

      <div class="card-panel" data-page="login">
        <h2>Sign in</h2>
        <div id="msg" class="msg hidden" role="alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Log in</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--muted)">
          New here? <a href="/register.html">Create an account</a>
        </p>
        <p style="font-size: 0.8rem; color: var(--muted); margin-top: 1rem">
          Demo admin: <code>admin@utsav.com</code> / <code>admin123</code>
        </p>
      </div>

      <footer class="site-footer">College Utsav Registration Portal</footer>
    </div>
    <script src="/script.js"></script>
  </body>
</html>
